<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaguar Neural Interface</title>
    <style>
        /* Base Styling & Cyberpunk Grid Background */
        body {
            margin: 0;
            padding: 0;
            background-color: #050b14;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: 
                linear-gradient(rgba(0, 255, 204, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 204, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Main Terminal Container */
        .terminal-container {
            border: 2px solid #00ffcc;
            background: rgba(5, 11, 20, 0.85);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2), inset 0 0 15px rgba(0, 255, 204, 0.1);
            width: 400px;
            text-align: center;
            position: relative;
        }

        /* Scanline effect over the terminal */
        .terminal-container::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        h2 {
            margin-top: 0;
            letter-spacing: 2px;
            text-shadow: 0 0 8px #00ffcc;
            font-size: 1.2rem;
        }

        /* --- 1. PULSING HOLOGRAPHIC JAGUAR --- */
        .jaguar-hologram {
            width: 150px;
            height: 150px;
            margin: 30px auto;
            position: relative;
            background: url('Jaguar.png') no-repeat center center;
            background-size: contain;
            /* Fallback placeholder shape if image isn't loaded yet */
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
            
            /* Core pulse animation */
            animation: holoPulse 2.5s infinite ease-in-out;
        }

        /* Hologram Glitch/Scan Effect Lines */
        .jaguar-hologram::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(transparent, rgba(0, 255, 204, 0.15), transparent);
            animation: scanLine 3s infinite linear;
        }

        @keyframes holoPulse {
            0%, 100% {
                transform: scale(1);
                filter: drop-shadow(0 0 8px rgba(0, 255, 204, 0.6)) brightness(1);
            }
            50% {
                transform: scale(1.03);
                filter: drop-shadow(0 0 18px rgba(0, 255, 204, 0.9)) brightness(1.2);
            }
        }

        @keyframes scanLine {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        /* --- 2. ANIMATING DATA WAVES (Neural Network) --- */
        .data-header {
            font-size: 0.8rem;
            text-align: left;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .wave-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            height: 40px;
            margin-bottom: 25px;
            padding: 0 10px;
            border-bottom: 1px solid rgba(0, 255, 204, 0.3);
        }

        .bar {
            width: 6px;
            background-color: #00ffcc;
            box-shadow: 0 0 5px #00ffcc;
            border-radius: 3px 3px 0 0;
            height: 10%;
            animation: equalizer 1.2s ease-in-out infinite alternate;
        }

        /* Staggering the animations to look like live erratic data */
        .bar:nth-child(1) { animation-delay: 0.1s; animation-duration: 0.8s; }
        .bar:nth-child(2) { animation-delay: 0.4s; animation-duration: 1.1s; }
        .bar:nth-child(3) { animation-delay: 0.2s; animation-duration: 0.7s; }
        .bar:nth-child(4) { animation-delay: 0.6s; animation-duration: 0.9s; }
        .bar:nth-child(5) { animation-delay: 0.3s; animation-duration: 1.2s; }
        .bar:nth-child(6) { animation-delay: 0.5s; animation-duration: 0.6s; }
        .bar:nth-child(7) { animation-delay: 0.1s; animation-duration: 1.0s; }

        @keyframes equalizer {
            0% { height: 15%; }
            100% { height: 95%; }
        }

        /* --- 3. LOADING PROCESSING CAPACITY BAR --- */
        .progress-container {
            text-align: left;
            margin-bottom: 10px;
        }

        .progress-bar-track {
            width: 100%;
            height: 12px;
            border: 1px solid #00ffcc;
            padding: 2px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.5);
        }

        .progress-fill {
            height: 100%;
            background-color: #00ffcc;
            box-shadow: 0 0 8px #00ffcc;
            width: 0%;
            animation: loadCapacity 4s infinite steps(20, end);
        }

        @keyframes loadCapacity {
            0% { width: 0%; }
            80% { width: 100%; }
            100% { width: 100%; }
        }

        /* Status Footer Text */
        .status-footer {
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            opacity: 0.7;
            margin-top: 15px;
        }

        .blink-text {
            animation: textBlink 1s infinite steps(2, start);
        }

        @keyframes textBlink {
            to { visibility: hidden; }
        }
    </style>
</head>
<body>

    <div class="terminal-container">
        <h2>SYSTEM: JAGUAR_CORE.EXE</h2>
        
        <div class="jaguar-hologram"></div>

        <div class="data-header">NEURAL LINK DATA STREAM:</div>
        <div class="wave-container">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <div class="progress-container">
            <div class="data-header">PROCESSING CAPACITY:</div>
            <div class="progress-bar-track">
                <div class="progress-fill"></div>
            </div>
        </div>

        <div class="status-footer">
            <div>SECURE_CONNECTION: YES</div>
            <div class="blink-text">SYNCING...</div>
        </div>
    </div>

</body>
</html>
